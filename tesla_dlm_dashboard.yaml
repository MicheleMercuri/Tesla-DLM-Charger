  # ═══════════════════════════════════════════════════════════════════
  # COLONNA 3: MONITORAGGIO & ENERGIA
  # ═══════════════════════════════════════════════════════════════════
  - type: grid
    column_span: 1
    cards:
      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: MONITORAGGIO
            subtitle: ""
            card_mod:
              style: >
                ha-card {
                  background: linear-gradient(135deg, rgba(20,20,35,0.95) 0%, rgba(30,40,60,0.90) 50%, rgba(20,30,50,0.95) 100%);
                  border: 1px solid rgba(76,175,80,0.22); border-radius: 24px; padding: 18px 24px 14px 24px;
                  position: relative; overflow: hidden;
                }
                ha-card .title {
                  margin: 0 !important; font-size: 20px !important; font-weight: 700 !important; line-height: 1.1;
                  display: inline-flex; align-items: center; gap: 10px;
                  background: linear-gradient(90deg, #4caf50, #81c784, #4caf50);
                  background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
                  animation: shine 3s linear infinite;
                }
                ha-card .title::before { content: "📊"; font-size: 20px; line-height: 1; -webkit-text-fill-color: #4caf50;
                  background: none !important; filter: drop-shadow(0 0 5px rgba(76,175,80,0.45)); }
                ha-card .subtitle { display: none !important; }
                ha-card::after {
                  content: ""; display: block; width: 100%; height: 4px; margin-top: 12px; border-radius: 999px;
                  background-image:
                    linear-gradient(90deg, rgba(76,175,80,0.20), rgba(129,199,132,0.20)),
                    linear-gradient(90deg, transparent 0%, rgba(76,175,80,0) 18%, rgba(76,175,80,0.70) 40%, rgba(129,199,132,0.85) 47%, rgba(255,255,255,1) 50%, rgba(129,199,132,0.85) 53%, rgba(76,175,80,0.70) 60%, rgba(76,175,80,0) 82%, transparent 100%),
                    radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,255,255,0.55) 35%, rgba(76,175,80,0.22) 58%, transparent 75%);
                  background-size: 100% 100%, 200% 100%, 18px 18px; background-repeat: no-repeat;
                  background-position: 0% 0, 110% 0, -12px 50%;
                  animation: sweep-main 2.2s ease-in-out infinite alternate;
                  box-shadow: 0 0 8px rgba(76,175,80,0.30), 0 0 16px rgba(129,199,132,0.18); pointer-events: none;
                }
                @keyframes shine { to { background-position: 200% center; } }
                @keyframes sweep-main {
                  0%   { background-position: 0% 0, 110% 0, -12px 50%; opacity: 0.65; }
                  50%  { opacity: 1; }
                  100% { background-position: 0% 0, -10% 0, calc(100% + 12px) 50%; opacity: 0.65; }
                }
