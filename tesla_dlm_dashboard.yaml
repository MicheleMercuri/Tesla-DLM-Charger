                secondary: Wallbox V
                icon: mdi:sine-wave
                icon_color: >-
                  {% set v = states('sensor.wallbox_em_channel_2_voltage') | float(230) %}
                  {% if v > 246 %}red{% elif v > 240 %}amber{% else %}green{% endif %}
                vertical: true
                tap_action:
                  action: more-info
                card_mod:
                  style: >-
                    :host { --mush-icon-size: 36px; }
                    ha-card { background: linear-gradient(145deg, rgba(30,40,60,0.55), rgba(15,20,35,0.35));
                      border: 1px solid rgba(255,255,255,0.10); border-radius: 18px; padding: 10px; }
              - type: custom:mushroom-template-card
