title: Tesla DLM
path: tesla-dlm
icon: mdi:ev-station
theme: ios-dark-mode-blue-red
dense_section_placement: true
max_columns: 3
type: sections
sections:
  # ═══════════════════════════════════════════════════════════════════
  # HEADER - Full width
  # ═══════════════════════════════════════════════════════════════════
  - type: grid
    column_span: 3
    cards:
      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: TESLA DLM
            subtitle: ""
            card_mod:
              style: |
                ha-card {
                  background: linear-gradient(135deg,
                    rgba(15, 15, 28, 0.97) 0%,
                    rgba(22, 30, 48, 0.95) 50%,
                    rgba(15, 22, 40, 0.97) 100%);
                  border: 1px solid rgba(0, 188, 212, 0.2);
                  border-radius: 24px;
                  padding: 18px 24px 14px 24px;
                  position: relative;
                  overflow: hidden;
                }
                ha-card .header, ha-card .container { padding: 0 !important; margin: 0 !important; }
                ha-card .title {
                  margin: 0 !important; padding: 0 !important;
                  font-size: 28px !important; font-weight: 700 !important; line-height: 1.1 !important;
                  display: inline-flex !important; align-items: center !important; gap: 10px !important; width: max-content;
                  background: linear-gradient(90deg, #00bcd4, #00e5ff, #00bcd4);
                  background-size: 200% auto;
                  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
                  animation: shine 3s linear infinite;
                  pointer-events: none;
                }
                ha-card .title::before {
                  content: "🚗⚡"; font-size: 26px; line-height: 1;
                  -webkit-text-fill-color: #00bcd4;
                  background: none !important;
                  filter: drop-shadow(0 0 5px rgba(0,188,212,0.55));
                }
                ha-card .subtitle { display: none !important; }
                ha-card::after {
                  content: ""; display: block; width: 100%; height: 4px; margin-top: 12px; border-radius: 999px;
                  background-image:
                    linear-gradient(90deg, rgba(0,188,212,0.20), rgba(0,229,255,0.20)),
                    linear-gradient(90deg,
                      transparent 0%, rgba(0,188,212,0) 18%, rgba(0,188,212,0.70) 40%,
                      rgba(0,229,255,0.85) 47%, rgba(255,255,255,1) 50%,
                      rgba(0,229,255,0.85) 53%, rgba(0,188,212,0.70) 60%,
                      rgba(0,188,212,0) 82%, transparent 100%),
                    radial-gradient(circle,
                      rgba(255,255,255,1) 0%, rgba(255,255,255,0.55) 35%,
                      rgba(0,188,212,0.22) 58%, transparent 75%);
                  background-size: 100% 100%, 200% 100%, 18px 18px;
                  background-repeat: no-repeat;
                  background-position: 0% 0, 110% 0, -12px 50%;
                  animation: sweep-main 2.2s ease-in-out infinite alternate;
                  box-shadow: 0 0 8px rgba(0,188,212,0.35), 0 0 16px rgba(0,188,212,0.22);
                  pointer-events: none;
                }
                @keyframes shine { to { background-position: 200% center; } }
                @keyframes sweep-main {
                  0%   { background-position: 0% 0, 110% 0, -12px 50%; opacity: 0.65; }
                  50%  { opacity: 1; }
                  100% { background-position: 0% 0, -10% 0, calc(100% + 12px) 50%; opacity: 0.65; }
                }
          # ── Chips di stato rapido ──
          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              - type: template
                icon: >-
                  {% set m = states('input_select.tesla_chargemode_select') %}
                  {% if m == 'PV DLM' %}mdi:solar-power-variant
                  {% elif m == 'Grid DLM' %}mdi:transmission-tower
                  {% elif m == 'Off Peak DLM' %}mdi:weather-night
                  {% elif m == 'Inverter DLM' %}mdi:refresh
                  {% elif m == 'Octopus DLM' %}mdi:octopus
                  {% else %}mdi:power-off{% endif %}
                icon_color: >-
                  {% set m = states('input_select.tesla_chargemode_select') %}
                  {{ 'cyan' if m != 'Off' else 'disabled' }}
                content: "{{ states('input_select.tesla_chargemode_select') }}"
                tap_action:
                  action: more-info
                  entity: input_select.tesla_chargemode_select
              - type: template
                icon: >-
                  {{ 'mdi:car-connected' if is_state('switch.model3_polling','on') else 'mdi:car-off' }}
                icon_color: >-
                  {{ 'green' if is_state('switch.model3_polling','on') else 'red' }}
                content: >-
                  {{ 'Sveglia' if is_state('switch.model3_polling','on') else 'Idle' }}
              - type: template
                icon: >-
                  {{ 'mdi:home' if is_state('device_tracker.model3_location_tracker','home') else 'mdi:car' }}
                icon_color: >-
                  {{ 'green' if is_state('device_tracker.model3_location_tracker','home') else 'amber' }}
                content: >-
                  {{ 'Casa' if is_state('device_tracker.model3_location_tracker','home') else 'Fuori' }}
              - type: template
                icon: mdi:battery
                icon_color: >-
                  {% set soc = states('sensor.model3_battery') | float(0) %}
                  {% if soc >= 60 %}green{% elif soc >= 40 %}yellow{% elif soc >= 20 %}orange{% else %}red{% endif %}
                content: "{{ states('sensor.model3_battery') }}%"
              - type: template
                icon: mdi:ev-station
                icon_color: >-
                  {{ 'cyan' if states('sensor.teslapower_kw_front') | float(0) > 0 else 'disabled' }}
                content: "{{ states('sensor.teslapower_kw_front') | float(0) | round(1) }} kW"
          # ── Top 4 cards ──
          - type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                entity: sensor.model3_battery
                primary: "{{ states('sensor.model3_battery') | float(0) | round(0) }} %"
                secondary: SOC Tesla
                icon: >-
                  {% set soc = states('sensor.model3_battery') | float(0) %}
                  {% set charging = states('sensor.teslapower_kw_front')|float(0) > 0 %}
                  {% if charging %}
                    {% if soc >= 90 %}mdi:battery-charging-100{% elif soc >= 80 %}mdi:battery-charging-90
                    {% elif soc >= 70 %}mdi:battery-charging-80{% elif soc >= 60 %}mdi:battery-charging-70
                    {% elif soc >= 50 %}mdi:battery-charging-60{% elif soc >= 40 %}mdi:battery-charging-50
                    {% elif soc >= 30 %}mdi:battery-charging-40{% elif soc >= 20 %}mdi:battery-charging-30
                    {% elif soc >= 10 %}mdi:battery-charging-20{% else %}mdi:battery-charging-10{% endif %}
                  {% else %}
                    {% if soc >= 95 %}mdi:battery{% elif soc >= 85 %}mdi:battery-90
                    {% elif soc >= 75 %}mdi:battery-80{% elif soc >= 65 %}mdi:battery-70
                    {% elif soc >= 55 %}mdi:battery-60{% elif soc >= 45 %}mdi:battery-50
                    {% elif soc >= 35 %}mdi:battery-40{% elif soc >= 25 %}mdi:battery-30
                    {% elif soc >= 15 %}mdi:battery-20{% elif soc >= 5 %}mdi:battery-10
                    {% else %}mdi:battery-outline{% endif %}
                  {% endif %}
                vertical: true
                tap_action:
                  action: more-info
                color: >-
                  {% set soc = states('sensor.model3_battery') | float(0) %}
                  {% if soc >= 60 %}green{% elif soc >= 40 %}yellow{% elif soc >= 20 %}orange{% else %}red{% endif %}
                card_mod:
                  style: |
                    ha-card {
                      {% set soc = states('sensor.model3_battery') | float(0) %}
                      {% if soc >= 60 %}{% set r,g,b = 76,175,80 %}
                      {% elif soc >= 40 %}{% set r,g,b = 255,235,59 %}
                      {% elif soc >= 20 %}{% set r,g,b = 255,152,0 %}
                      {% else %}{% set r,g,b = 244,67,54 %}{% endif %}
                      background: linear-gradient(180deg, rgba({{r}},{{g}},{{b}},0.15) 0%, rgba({{r}},{{g}},{{b}},0.03) 100%);
                      border: 1px solid rgba({{r}},{{g}},{{b}},0.3); border-radius: 16px;
                    }
                    .primary { font-size: 20px !important; font-weight: 700 !important; }
              - type: custom:mushroom-template-card
                entity: sensor.teslapower_kw_front
                primary: "{{ states('sensor.teslapower_kw_front') | float(0) | round(1) }} kW"
                secondary: Potenza Ricarica
                icon: mdi:ev-station
                icon_color: cyan
                vertical: true
                tap_action:
                  action: more-info
                card_mod:
                  style: >-
                    ha-card { background: linear-gradient(180deg, rgba(0,188,212,0.15) 0%, rgba(0,188,212,0.03) 100%);
                      border: 1px solid rgba(0,188,212,0.3); border-radius: 16px; }
                    .primary { font-size: 20px !important; font-weight: 700 !important; color: rgba(0,188,212,1) !important; }
              - type: custom:mushroom-template-card
                entity: sensor.model3_energy_added
                primary: "{{ states('sensor.model3_energy_added') | float(0) | round(2) }} kWh"
                secondary: Energy Added
                icon: mdi:lightning-bolt
                icon_color: rgb(0,200,83)
                vertical: true
                tap_action:
                  action: more-info
                card_mod:
                  style: >-
                    ha-card { background: linear-gradient(180deg, rgba(0,200,83,0.15) 0%, rgba(0,200,83,0.03) 100%);
                      border: 1px solid rgba(0,200,83,0.3); border-radius: 16px; }
                    .primary { font-size: 20px !important; font-weight: 700 !important; color: rgba(0,200,83,1) !important; }
              - type: custom:mushroom-template-card
                entity: sensor.battery_state_of_capacity
                primary: "{{ states('sensor.battery_state_of_capacity') | float(0) | round(0) }} %"
                secondary: Luna2000
                icon: mdi:home-battery
                icon_color: rgb(255,193,7)
                vertical: true
                tap_action:
                  action: more-info
                card_mod:
                  style: >-
                    ha-card { background: linear-gradient(180deg, rgba(255,193,7,0.15) 0%, rgba(255,193,7,0.03) 100%);
                      border: 1px solid rgba(255,193,7,0.3); border-radius: 16px; }
                    .primary { font-size: 20px !important; font-weight: 700 !important; color: rgba(255,193,7,1) !important; }
        grid_options:
          columns: full
        card_mod:
          style: >-
            ha-card { background: transparent !important; box-shadow: none !important; }

  # ═══════════════════════════════════════════════════════════════════
  # COLONNA 1: STATO & RICARICA
  # ═══════════════════════════════════════════════════════════════════
  - type: grid
    column_span: 1
    cards:
      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: STATO & RICARICA
            subtitle: ""
            card_mod:
              style: >
                ha-card {
                  background: linear-gradient(135deg, rgba(20,20,35,0.95) 0%, rgba(30,40,60,0.90) 50%, rgba(20,30,50,0.95) 100%);
                  border: 1px solid rgba(0,188,212,0.22); border-radius: 24px; padding: 18px 24px 14px 24px;
                  position: relative; overflow: hidden;
                }
                ha-card .title {
                  margin: 0 !important; font-size: 20px !important; font-weight: 700 !important; line-height: 1.1;
                  display: inline-flex; align-items: center; gap: 10px;
                  background: linear-gradient(90deg, #00bcd4, #00e5ff, #00bcd4);
                  background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
                  animation: shine 3s linear infinite;
                }
                ha-card .title::before { content: "🔋"; font-size: 20px; line-height: 1; -webkit-text-fill-color: #00bcd4;
                  background: none !important; filter: drop-shadow(0 0 5px rgba(0,188,212,0.45)); }
                ha-card .subtitle { display: none !important; }
                ha-card::after {
                  content: ""; display: block; width: 100%; height: 4px; margin-top: 12px; border-radius: 999px;
                  background-image:
                    linear-gradient(90deg, rgba(0,188,212,0.20), rgba(0,229,255,0.20)),
                    linear-gradient(90deg, transparent 0%, rgba(0,188,212,0) 18%, rgba(0,188,212,0.70) 40%, rgba(0,229,255,0.85) 47%, rgba(255,255,255,1) 50%, rgba(0,229,255,0.85) 53%, rgba(0,188,212,0.70) 60%, rgba(0,188,212,0) 82%, transparent 100%),
                    radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,255,255,0.55) 35%, rgba(0,188,212,0.22) 58%, transparent 75%);
                  background-size: 100% 100%, 200% 100%, 18px 18px; background-repeat: no-repeat;
                  background-position: 0% 0, 110% 0, -12px 50%;
                  animation: sweep-main 2.2s ease-in-out infinite alternate;
                  box-shadow: 0 0 8px rgba(0,188,212,0.30), 0 0 16px rgba(0,229,255,0.18); pointer-events: none;
                }
                @keyframes shine { to { background-position: 200% center; } }
                @keyframes sweep-main {
                  0%   { background-position: 0% 0, 110% 0, -12px 50%; opacity: 0.65; }
                  50%  { opacity: 1; }
                  100% { background-position: 0% 0, -10% 0, calc(100% + 12px) 50%; opacity: 0.65; }
                }
          # ── Gauge SOC ──
          - type: custom:gauge-card-pro
            entity: sensor.model3_battery
            min: 0
            max: 100
            needle: true
            needle_color: "#ffffff"
            gradient: true
            gradient_resolution: medium
            round: medium
            segments:
              - from: 0
                color: "#f44336"
              - from: 15
                color: "#ff9800"
              - from: 30
                color: "#ffeb3b"
              - from: 50
                color: "#66bb6a"
              - from: 70
                color: "#4caf50"
              - from: 90
                color: "#00e676"
            setpoint:
              type: template
              value: "{{ states('input_number.tesla_battery_charge_target') | float(80) }}"
              color: "#00bcd4"
              label: true
              precision: 0
            inner:
              mode: severity
              gradient: true
              round: medium
              value: "{{ states('sensor.model3_battery') | float(0) }}"
              segments:
                - from: 0
                  color: rgba(244,67,54,0.4)
                - from: 30
                  color: rgba(255,235,59,0.3)
                - from: 60
                  color: rgba(76,175,80,0.4)
            value_texts:
              primary: "{{ states('sensor.model3_battery') | float(0) | round(0) | int }}"
              primary_color: >-
                {% set soc = states('sensor.model3_battery') | float(0) %}
                {% if soc >= 60 %}#4caf50{% elif soc >= 30 %}#ffeb3b{% else %}#f44336{% endif %}
              primary_unit: "%"
              secondary: >-
                Target: {{ states('input_number.tesla_battery_charge_target') | float(80) | round(0) | int }}%
            titles:
              primary: SOC Batteria
              primary_color: rgba(255,255,255,0.85)
              primary_font_size: 14px
            hide_background: true
            tap_action:
              action: more-info
            card_mod:
              style: |
                ha-card {
                  background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.2) 100%);
                  border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 12px;
                }
                * {
                  --main-needle-stroke-width: 1.5px;
                  --main-needle-stroke-color: rgba(255,255,255,0.6);
                  --main-setpoint-needle-stroke-color: rgba(0,188,212,0.8);
                  --main-setpoint-needle-stroke-width: 1px;
                }
          # ── Gauge Potenza Ricarica ──
          - type: custom:gauge-card-pro
            entity: sensor.teslapower_kw_front
            min: 0
            max: 7.4
            needle: true
            needle_color: "#ffffff"
            gradient: true
            gradient_resolution: auto
            round: full
            segments:
              - from: 0
                color: "#ffeb3b"
              - from: 2
                color: "#4caf50"
              - from: 5
                color: "#f44336"
            value_texts:
              primary: "{{ states('sensor.teslapower_kw_front') | float(0) | round(1) }}"
              primary_unit: kW
              primary_color: "#ffffff"
            titles:
              primary: Potenza Ricarica
              primary_color: "#aaaaaa"
              primary_font_size: 12px
            tap_action:
              action: more-info
            card_mod:
              style: |
                ha-card {
                  background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.2) 100%);
                  border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 12px;
                }
          # ── Info ricarica ──
          - type: custom:mushroom-template-card
            entity: sensor.model3_battery
            primary: >-
              {{ states('sensor.model3_energy_added') | float(0) | round(2) }} kWh added |
              {{ states('sensor.model3_battery') }}% SOC
            secondary: >-
              {% set s = states('sensor.model3_time_charge_complete') %}
              {% set m = state_attr('sensor.model3_time_charge_complete','minutes_to_full_charge') %}
              {% if s in ['unknown','unavailable','none'] or m in [0,'0',none] %}
                Non in ricarica
              {% else %}
                Fine ricarica: {{ states('sensor.tesla_time_to_full_charge') }}
              {% endif %}
            icon: mdi:battery-clock
            icon_color: >-
              {% if states('sensor.teslapower_kw_front') | float(0) > 0 %}cyan{% else %}disabled{% endif %}
            multiline_secondary: true
            card_mod:
              style: >-
                ha-card { background: linear-gradient(180deg, rgba(0,188,212,0.12) 0%, rgba(0,188,212,0.02) 100%);
                  border: 1px solid rgba(0,188,212,0.25); border-radius: 16px; }
          # ── Ampere attuali ──
          - type: custom:mushroom-template-card
            entity: number.model3_charging_amps
            primary: >-
              {{ states('number.model3_charging_amps') | float(0) | round(0) }} A ×
              {{ states('sensor.wallbox_em_channel_2_voltage') | float(230) | round(0) }} V
            secondary: >-
              Wallbox: {{ states('sensor.wallbox_em_channel_1_power') | float(0) | round(0) }} W |
              Voltage AB: {{ states('sensor.a_b_line_voltage') | float(0) | round(0) }} V
            icon: mdi:current-ac
            icon_color: >-
              {% if states('number.model3_charging_amps') | float(0) > 0 %}amber{% else %}disabled{% endif %}
            multiline_secondary: true
            card_mod:
              style: >-
                ha-card { background: linear-gradient(180deg, rgba(255,193,7,0.12) 0%, rgba(255,193,7,0.02) 100%);
                  border: 1px solid rgba(255,193,7,0.25); border-radius: 16px; }
          # ── Grafico storico ──
          - type: custom:apexcharts-card
            graph_span: 24h
            update_interval: 30s
            header:
              show: false
            experimental:
              color_threshold: true
            all_series_config:
              type: area
              curve: smooth
              stroke_width: 2
              opacity: 0.4
              group_by:
                func: avg
                duration: 5min
                fill: last
            series:
              - entity: sensor.teslapower_kw_front
                name: Potenza carica
                unit: kW
                float_precision: 1
                color_threshold:
                  - value: 0
                    color: "#00e5ff"
                  - value: 3
                    color: "#00e676"
                  - value: 5
                    color: "#ff9800"
              - entity: sensor.model3_battery
                name: SOC
                unit: "%"
                float_precision: 0
                color: "#7c4dff"
                opacity: 0.3
                stroke_width: 1
            yaxis:
              - id: power
                min: 0
                max: 8
                decimals: 1
                apex_config:
                  tickAmount: 4
                  labels:
                    style:
                      colors: rgba(255,255,255,0.75)
              - id: soc
                min: 0
                max: 100
                opposite: true
                decimals: 0
                apex_config:
                  tickAmount: 5
                  labels:
                    style:
                      colors: rgba(255,255,255,0.5)
            apex_config:
              chart:
                height: 200
                toolbar:
                  show: false
                zoom:
                  enabled: false
              grid:
                borderColor: rgba(255,255,255,0.06)
                strokeDashArray: 3
              xaxis:
                labels:
                  style:
                    colors: rgba(255,255,255,0.55)
              legend:
                show: false
              tooltip:
                theme: dark
              fill:
                type: gradient
                gradient:
                  shade: dark
                  shadeIntensity: 0.6
                  inverseColors: false
                  opacityFrom: 0.4
                  opacityTo: 0
                  stops:
                    - 0
                    - 40
                    - 100
            card_mod:
              style: |
                ha-card {
                  background: rgba(0,0,0,0.10);
                  border-radius: 20px;
                  border: 1px solid rgba(255,255,255,0.12);
                  box-shadow: 0 0 10px rgba(0,0,0,0.4);
                  padding: 8px 6px 4px 6px;
                  backdrop-filter: blur(8px);
                }
        card_mod:
          style: |
            ha-card {
              background: linear-gradient(160deg, rgba(0,188,212,0.1) 0%, rgba(20,30,50,0.95) 100%);
              border: 1px solid rgba(0,188,212,0.3);
              border-radius: 24px;
              padding: 16px;
              backdrop-filter: blur(10px);
            }

  # ═══════════════════════════════════════════════════════════════════
  # COLONNA 2: CONTROLLI
  # ═══════════════════════════════════════════════════════════════════
  - type: grid
    column_span: 1
    cards:
      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: CONTROLLI
            subtitle: ""
            card_mod:
              style: >
                ha-card {
                  background: linear-gradient(135deg, rgba(20,20,35,0.95) 0%, rgba(30,40,60,0.90) 50%, rgba(20,30,50,0.95) 100%);
                  border: 1px solid rgba(33,150,243,0.22); border-radius: 24px; padding: 18px 24px 14px 24px;
                  position: relative; overflow: hidden;
                }
                ha-card .title {
                  margin: 0 !important; font-size: 20px !important; font-weight: 700 !important; line-height: 1.1;
                  display: inline-flex; align-items: center; gap: 10px;
                  background: linear-gradient(90deg, #2196f3, #64b5f6, #2196f3);
                  background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
                  animation: shine 3s linear infinite;
                }
                ha-card .title::before { content: "🎛️"; font-size: 20px; line-height: 1; -webkit-text-fill-color: #2196f3;
                  background: none !important; filter: drop-shadow(0 0 5px rgba(33,150,243,0.45)); }
                ha-card .subtitle { display: none !important; }
                ha-card::after {
                  content: ""; display: block; width: 100%; height: 4px; margin-top: 12px; border-radius: 999px;
                  background-image:
                    linear-gradient(90deg, rgba(33,150,243,0.20), rgba(100,181,246,0.20)),
                    linear-gradient(90deg, transparent 0%, rgba(33,150,243,0) 18%, rgba(33,150,243,0.70) 40%, rgba(100,181,246,0.85) 47%, rgba(255,255,255,1) 50%, rgba(100,181,246,0.85) 53%, rgba(33,150,243,0.70) 60%, rgba(33,150,243,0) 82%, transparent 100%),
                    radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,255,255,0.55) 35%, rgba(33,150,243,0.22) 58%, transparent 75%);
                  background-size: 100% 100%, 200% 100%, 18px 18px; background-repeat: no-repeat;
                  background-position: 0% 0, 110% 0, -12px 50%;
                  animation: sweep-main 2.2s ease-in-out infinite alternate;
                  box-shadow: 0 0 8px rgba(33,150,243,0.30), 0 0 16px rgba(100,181,246,0.18); pointer-events: none;
                }
                @keyframes shine { to { background-position: 200% center; } }
                @keyframes sweep-main {
                  0%   { background-position: 0% 0, 110% 0, -12px 50%; opacity: 0.65; }
                  50%  { opacity: 1; }
